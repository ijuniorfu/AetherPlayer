name: AetherPlayer
options:
  bundleIdPrefix: de.superuser404
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_ENTITLEMENTS: Sources/AetherPlayer/Resources/AetherPlayer.entitlements
    ENABLE_HARDENED_RUNTIME: YES
packages:
  AetherEngine:
    url: https://github.com/superuser404notfound/AetherEngine
    revision: 654da7f5fe3e5aa428cacf97ad60a0c53b99af45
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  AetherPlayer:
    type: application
    platform: macOS
    sources:
      - path: Sources/AetherPlayer
    info:
      path: Sources/AetherPlayer/Resources/Info.plist
      properties:
        CFBundleDisplayName: AetherPlayer
        CFBundleName: AetherPlayer
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        SUFeedURL: https://superuser404notfound.github.io/AetherPlayer/appcast.xml
        SUPublicEDKey: PLACEHOLDER_REPLACE_WITH_GENERATED_ED_PUBLIC_KEY
        SUEnableInstallerLauncherService: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Video
            LSItemContentTypes:
              - public.movie
              - public.video
              - org.matroska.mkv
              - public.mpeg-4
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.superuser404.AetherPlayer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # DIRECT_DISTRIBUTION is intentionally NOT set here. Sparkle is linked
        # but its updater code is gated behind this flag and stays dormant until
        # a real EdDSA SUPublicEDKey is in place -- otherwise Sparkle fatals at
        # launch ("EdDSA public key is not valid"). Enable the flag (here or in a
        # release-only config) once the key, SPARKLE_PRIVATE_KEY secret, and
        # GitHub Pages appcast are set up. The App Store build must leave it off.
    dependencies:
      - package: AetherEngine
      - package: Sparkle
  AetherPlayerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AetherPlayerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AetherPlayer
